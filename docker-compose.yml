version: '3.8'

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm_app
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/html
      - vendor_data:/var/www/html/vendor
    networks:
      - crm_network
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - APP_ENV=local
      - APP_DEBUG=true

  nginx:
    image: nginx:1.25-alpine
    container_name: crm_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - crm_network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: crm_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: hackathon_crm
      MYSQL_USER: hackathon
      MYSQL_PASSWORD: hackathon_secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - crm_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crm_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - node_modules_data:/app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api
    networks:
      - crm_network

networks:
  crm_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  vendor_data:
    driver: local
  node_modules_data:
    driver: local
